name: WeChat Article Reader CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 lxml requests pytest
        pip install playwright
        playwright install chromium
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 scripts/wechat_reader.py --max-line-length=120 --ignore=E501,W503
    
    - name: Syntax check
      run: python -m py_compile scripts/wechat_reader.py
    
    - name: Test argument parsing
      run: |
        # Test that the script runs without URL (should show help)
        python scripts/wechat_reader.py --help > /dev/null
    
    - name: Test JSON output format
      run: |
        # Create a mock test case
        echo '{"title": "test", "author": "test", "publish_time": "test", "content": "test", "url": "http://example.com"}' > /tmp/test.json
        python scripts/wechat_reader.py --json http://example.com 2>&1 || true
    
    - name: Verify dependency versions
      run: |
        # Check that critical dependencies are available
        python -c "import requests, bs4, openpyxl"
